{{- if and .Values.monitoring.serviceMonitor.enabled .Values.monitoring.ingressNginx.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-ingress-nginx
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress-nginx
    {{- range $key, $value := .Values.monitoring.serviceMonitor.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.monitoring.ingressNginx.namespace }}
  selector:
    matchLabels:
      {{- toYaml .Values.monitoring.ingressNginx.selectorLabels | nindent 6 }}
  endpoints:
    - port: {{ .Values.monitoring.ingressNginx.portName }}
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
