{{- if .Values.notifications.ntfy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-ntfy
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntfy
spec:
  type: ClusterIP
  selector:
    {{- include "svd-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ntfy
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
{{- end }}
