{{- if and .Values.observability.grafana.external.enabled (not .Values.observability.prometheus.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-grafana-external
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ .Values.observability.grafana.external.serviceName }}.{{ .Values.observability.grafana.external.namespace }}.svc.cluster.local
{{- end }}
