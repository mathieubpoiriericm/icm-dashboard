{{- if .Values.monitoring.blackboxExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-blackbox-exporter
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: blackbox-exporter
spec:
  type: ClusterIP
  selector:
    {{- include "svd-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: blackbox-exporter
  ports:
    - name: http
      port: {{ .Values.monitoring.blackboxExporter.port }}
      targetPort: {{ .Values.monitoring.blackboxExporter.port }}
      protocol: TCP
{{- end }}
