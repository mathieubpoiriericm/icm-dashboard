{{- if .Values.observability.prometheus.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-grafana-image-renderer
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-image-renderer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "svd-dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana-image-renderer
  template:
    metadata:
      labels:
        {{- include "svd-dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana-image-renderer
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: renderer
          image: grafana/grafana-image-renderer:3.12.1
          ports:
            - containerPort: 8081
          env:
            - name: ENABLE_METRICS
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
{{- end }}
