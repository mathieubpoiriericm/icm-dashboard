{{- if .Values.notifications.healthchecks.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-healthchecks
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: healthchecks
spec:
  type: ClusterIP
  selector:
    {{- include "svd-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: healthchecks
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
{{- end }}
