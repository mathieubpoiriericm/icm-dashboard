apiVersion: v1
kind: Secret
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-secrets
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_HOST: {{ include "svd-dashboard.fullname" . }}-postgresql
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgresql.credentials.database | quote }}
  DB_USER: {{ .Values.postgresql.credentials.username | quote }}
  DB_PASSWORD: {{ .Values.postgresql.credentials.password | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  NCBI_API_KEY: {{ .Values.secrets.ncbiApiKey | quote }}
  ENTREZ_EMAIL: {{ .Values.secrets.entrezEmail | quote }}
  UNPAYWALL_EMAIL: {{ .Values.secrets.unpaywallEmail | quote }}
  PIPELINE_NOTIFY_URLS: {{ .Values.secrets.notifyUrls | quote }}
  PIPELINE_HEALTHCHECK_URL: {{ .Values.secrets.healthcheckUrl | quote }}
  POSTGRES_DB: {{ .Values.postgresql.credentials.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.credentials.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.credentials.password | quote }}
  .Renviron: |
    DB_HOST={{ include "svd-dashboard.fullname" . }}-postgresql
    DB_PORT=5432
    DB_NAME={{ .Values.postgresql.credentials.database }}
    DB_USER={{ .Values.postgresql.credentials.username }}
    DB_PASSWORD={{ .Values.postgresql.credentials.password }}
    NCBI_API_KEY={{ .Values.secrets.ncbiApiKey }}
    ENTREZ_EMAIL={{ .Values.secrets.entrezEmail }}
