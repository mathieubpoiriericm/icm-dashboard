{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "svd-dashboard.fullname" . }}
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.dashboard }}
        {{- if .Values.notifications.ntfy.enabled }}
        - {{ .Values.ingress.hosts.ntfy }}
        {{- end }}
        {{- if .Values.notifications.healthchecks.enabled }}
        - {{ .Values.ingress.hosts.healthchecks }}
        {{- end }}
        {{- if or .Values.observability.prometheus.enabled .Values.observability.grafana.external.enabled }}
        - {{ .Values.ingress.hosts.grafana }}
        {{- end }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.dashboard }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "svd-dashboard.fullname" . }}-dashboard
                port:
                  number: 3838
    {{- if .Values.notifications.ntfy.enabled }}
    - host: {{ .Values.ingress.hosts.ntfy }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "svd-dashboard.fullname" . }}-ntfy
                port:
                  number: 80
    {{- end }}
    {{- if .Values.notifications.healthchecks.enabled }}
    - host: {{ .Values.ingress.hosts.healthchecks }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "svd-dashboard.fullname" . }}-healthchecks
                port:
                  number: 8000
    {{- end }}
    {{- if .Values.observability.prometheus.enabled }}
    - host: {{ .Values.ingress.hosts.grafana }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-grafana
                port:
                  number: 80
    {{- else if .Values.observability.grafana.external.enabled }}
    - host: {{ .Values.ingress.hosts.grafana }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "svd-dashboard.fullname" . }}-grafana-external
                port:
                  number: {{ .Values.observability.grafana.external.port }}
    {{- end }}
{{- end }}
