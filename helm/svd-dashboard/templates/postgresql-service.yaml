apiVersion: v1
kind: Service
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-postgresql
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "svd-dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
    {{- if .Values.postgresql.exporter.enabled }}
    - name: metrics
      port: {{ .Values.postgresql.exporter.port }}
      targetPort: {{ .Values.postgresql.exporter.port }}
      protocol: TCP
    {{- end }}
