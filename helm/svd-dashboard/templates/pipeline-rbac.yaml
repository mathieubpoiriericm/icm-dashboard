apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-pipeline
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-pipeline
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-pipeline
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "svd-dashboard.fullname" . }}-pipeline
subjects:
  - kind: ServiceAccount
    name: {{ include "svd-dashboard.fullname" . }}-pipeline
    namespace: {{ .Release.Namespace }}
