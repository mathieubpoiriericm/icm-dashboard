apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svd-dashboard.fullname" . }}-dashboard
  labels:
    {{- include "svd-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "svd-dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "svd-dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - containerPort: 3838
          env:
            - name: PRELOAD_TABLE2
              value: {{ .Values.dashboard.preloadTable2 | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: qs-data
              mountPath: /srv/shiny-server/data/qs
              readOnly: true
            - name: renviron
              mountPath: /srv/shiny-server/.Renviron
              subPath: .Renviron
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 3838
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3838
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
      volumes:
        - name: qs-data
          persistentVolumeClaim:
            claimName: {{ include "svd-dashboard.fullname" . }}-qs-data
        - name: renviron
          secret:
            secretName: {{ include "svd-dashboard.fullname" . }}-secrets
