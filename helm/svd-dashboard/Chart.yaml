apiVersion: v2
name: svd-dashboard
description: SVD Dashboard platform — Shiny app, ETL pipeline, PostgreSQL, notifications, observability
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "~72.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.prometheus.enabled
  - name: victoria-logs-single
    version: "~0.x"
    repository: https://victoriametrics.github.io/helm-charts
    condition: observability.victoriaLogs.enabled
