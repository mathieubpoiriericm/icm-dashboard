# Alembic configuration for the SVD Dashboard pipeline.
#
# Database URL is constructed from environment variables at runtime
# (see pipeline/alembic/env.py). Do not hardcode credentials here.
#
# Usage:
#   alembic upgrade head         # Apply all pending migrations
#   alembic downgrade -1         # Roll back one migration
#   alembic revision -m "desc"   # Create a new migration
#   alembic current              # Show current revision
#   alembic history              # Show migration history

[alembic]
script_location = pipeline/alembic
prepend_sys_path = .

# Template used for generating new migration files.
# file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps (UTC recommended).
# timezone =

# Max length for the slug field in migration filenames.
# truncate_slug_length = 40

# Set to 'true' to run the environment during 'revision'
# (auto-generation of migration scripts).
# set to 'false' since we use raw SQL, not SQLAlchemy models.
# revision_environment = false

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
