<style>
@font-face {
    font-family: 'Raleway';
    src: url('fonts/Raleway-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Raleway';
    src: url('fonts/Raleway-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;

}

<style>
  body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    overflow: hidden;
  }
  body.svg-loading .fig {
    opacity: 0;
    visibility: hidden;
  }
  body.svg-ready .fig {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.35s ease-in-out;
  }
  .fig {
      display: flex;
      align-items: flex-start;
  }
  .fig-c {
      position: relative;
      z-index: 1;
  }
  #sidebar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    z-index: 1000;
    display: inline-block;
    width: 0;
    background: rgba(200, 200, 200, 0.4);
    color: #000;
    font-family: "Raleway", Arial, sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
    transition: width 0.3s ease, padding 0.3s ease;
    padding: 0;
    box-shadow: 2px 0 8px rgba(0,0,0,0.15);
    border-radius: 0 20px 20px 0;
  }
  #sidebar.open {
    width: auto;
    min-width: 179px;
    max-width: 319px;
    padding: 16px;
  }
  #sidebar-content {
    white-space: normal;
    word-wrap: break-word;
    max-width: 298px;
    opacity: 1;
    font-size: 12px;
    line-height: 1.55;
  }
  svg {
    font-family: "Raleway", Arial, sans-serif;
  }
  g.drug text {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
    cursor: pointer;
  }
  g.drug rect.drug-bg {
    visibility: visible;
    opacity: 1;
  }
  #tooltip {
    --tip-color-rgba: rgba(255,255,255,0.25);
    position: absolute;
    padding: 9px 10px;
    border-radius: 20px;
    min-width: 240px;
    max-width: 320px;
    font-family: "Raleway", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 18px 35px rgba(0,0,0,0.55),
      0 0 22px var(--tip-color-rgba);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    color: #fff;
    z-index: 9999;
    opacity: 0;
    transform: scale(0.94);
    transition:
      opacity 0.35s ease-in-out,
      transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    background: var(--tip-color-rgba);
  }
  #tooltip > * {
    position: relative;
    z-index: 2;
  }
  #tooltip::before {
    content: "";
    position: absolute;
    top: 0;
    left: -35%;
    width: 170%;
    height: 170%;
    background: radial-gradient(
      circle at top left,
      rgba(255,255,255,0.22),
      rgba(255,255,255,0.05) 40%,
      rgba(255,255,255,0) 70%
    );
    pointer-events: none;
    transform: rotate(25deg);
    z-index: 3;
  }
  #tooltip::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg, var(--tip-color-rgba), rgba(255,255,255,0));
    opacity: 0.9;
    pointer-events: none;
    z-index: 1;
  }
  #tooltip.show {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>
