# Combined Kubernetes manifests for monitoring stack
# Apply with: kubectl apply -f monitoring-stack.yaml
#
# Resources:
#   - NGINX Ingress ConfigMap (ingress-nginx namespace)
#   - Grafana Image Renderer Deployment + Service (monitoring namespace)
#   - RShiny Dashboard Deployment + Service (default namespace)
#   - RShiny Ingress (default namespace)

---
# NGINX Ingress ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  # Preserve real client IP
  use-forwarded-headers: "true"
  compute-full-forwarded-for: "true"
  enable-real-ip: "true"

  # JSON log format
  log-format-escape-json: "true"
  log-format-upstream: |
    {
      "timestamp": "$time_iso8601",
      "remote_addr": "$remote_addr",
      "x_forwarded_for": "$proxy_add_x_forwarded_for",
      "method": "$request_method",
      "request_uri": "$request_uri",
      "status": $status,
      "body_bytes_sent": $body_bytes_sent,
      "request_time": $request_time,
      "http_referer": "$http_referer",
      "http_user_agent": "$http_user_agent"
    }

---
# Grafana Image Renderer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-image-renderer
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-image-renderer
  template:
    metadata:
      labels:
        app: grafana-image-renderer
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: renderer
          image: grafana/grafana-image-renderer:3.12.1
          ports:
            - containerPort: 8081
          env:
            - name: ENABLE_METRICS
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
# Grafana Image Renderer Service
apiVersion: v1
kind: Service
metadata:
  name: grafana-image-renderer
  namespace: monitoring
spec:
  selector:
    app: grafana-image-renderer
  ports:
    - port: 8081
      targetPort: 8081

---
# RShiny Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rshiny-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shiny
  template:
    metadata:
      labels:
        app: shiny
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: rshiny-dashboard
          image: rshiny-dashboard:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3838
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: renviron
              mountPath: /srv/shiny-server/.Renviron
              subPath: .Renviron
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: renviron
          secret:
            secretName: renviron-secret
---
# RShiny Dashboard Service
apiVersion: v1
kind: Service
metadata:
  name: rshiny-dashboard
  namespace: default
spec:
  selector:
    app: shiny
  ports:
    - port: 3838
      targetPort: 3838

---
# RShiny Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rshiny-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: shiny.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rshiny-dashboard
                port:
                  number: 3838
