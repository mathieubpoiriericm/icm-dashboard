name: Weekly cSVD Pipeline Update

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: csvd_user
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: csvd_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Initialize database schema
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U csvd_user -d csvd_dashboard \
            -f misc/sql_files/setup.sql

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          DB_HOST: localhost
          DB_NAME: csvd_dashboard
          DB_USER: csvd_user
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python pipeline/main.py

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          install.packages(c("DBI", "RPostgres", "pool"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Regenerate RDS from database
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: csvd_dashboard
          DB_USER: csvd_user
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: Rscript scripts/trigger_update.R

      - name: Commit RDS changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/rdata/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update RDS: $(date +'%Y-%m-%d')"
          git push
