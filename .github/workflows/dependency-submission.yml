name: Checkout

on:
  push:
    branches: [main]
    paths:
      - "app.R"
      - "maRco/DESCRIPTION"
      - "dependency-graph.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1

      - name: Update dependency graph SHA
        run: |
          # Update the SHA in dependency-graph.json to current commit
          CURRENT_SHA=$(git rev-parse HEAD)
          sed -i "s/\"sha\": \"[^\"]*\"/\"sha\": \"$CURRENT_SHA\"/" dependency-graph.json

      - name: Submit dependency graph
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dependency-graph/snapshots \
            -d @dependency-graph.json
