name: Dependency Submission

on:
  push:
    branches: [main]
    paths:
      - "app.R"
      - "maRco/DESCRIPTION"
      - "dependency-graph.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update dependency graph metadata
        run: |
          # Update the SHA in dependency-graph.json to current commit (short form)
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/\"sha\": \"[^\"]*\"/\"sha\": \"$SHORT_SHA\"/" dependency-graph.json

          # Update the scanned timestamp to current UTC time
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s/\"scanned\": \"[^\"]*\"/\"scanned\": \"$CURRENT_DATE\"/" dependency-graph.json

      - name: Submit dependency graph
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dependency-graph/snapshots \
            -d @dependency-graph.json
